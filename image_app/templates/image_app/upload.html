<!-- image_app/templates/image_app/upload.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Image</title>
</head>
<body>
    <h1>Upload Image</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>

    {% if result_url %}
        <h2>Result:</h2>
        <img src="{{ result_url }}" alt="Processed Image">
    {% endif %}
</body>
</html>
